name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel stale in-progress runs when new commits arrive on the same branch or
# PR. Main branch runs are not cancelled so deploys can finish cleanly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Run unit tests with coverage
      run: bun test --coverage

    - name: Upload unit coverage
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-unit
        path: coverage/unit/

  functional-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install dependencies
      run: sudo apt install -y mupdf-tools openjdk-25-jdk-headless

    - name: Set up Java 25
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64" >> "$GITHUB_ENV"
        echo "/usr/lib/jvm/java-25-openjdk-amd64/bin" >> "$GITHUB_PATH"

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: python3 -m pip install -q -r functional_tests/requirements.txt

    - name: Run functional tests (shard ${{ matrix.shard }}/3)
      run: >
        TADA_COVERAGE=1 python3 -m pytest functional_tests/
        -v -n auto --durations=10
        --shard ${{ matrix.shard }} --num-shards 3

    - name: Upload functional coverage
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: coverage-functional-${{ matrix.shard }}
        path: coverage/functional/

  unit-test-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Run unit tests
      run: bun test

  functional-test-windows:
    runs-on: windows-latest

    # Force Python into UTF-8 mode so Path.read_text() / Path.write_text()
    # and open() default to UTF-8 instead of the Windows system code page
    # (cp1252 on English locales). Without this, tests that read Tada's
    # generated HTML fail with charmap codec errors when the content
    # contains smart quotes, em-dashes, or other non-ASCII bytes from
    # markdown-it's typographer.
    env:
      PYTHONUTF8: "1"

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install mupdf (provides mutool)
      run: choco install mupdf -y --no-progress

    - name: Set up Java 25
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
      with:
        distribution: temurin
        java-version: '25'

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.13"

    - name: Install Python dependencies
      run: python -m pip install -q -r functional_tests/requirements.txt

    - name: Run functional tests (shard ${{ matrix.shard }}/3)
      run: >
        python -m pytest functional_tests/
        -v -n auto --durations=10
        --shard ${{ matrix.shard }} --num-shards 3

  playwright:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Install Playwright browsers
      run: bunx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: bun run test:playwright

  coverage:
    needs: [unit-test, functional-test]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Download unit coverage
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: coverage-unit
        path: coverage/unit/

    - name: Download functional coverage (all shards)
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        pattern: coverage-functional-*
        path: coverage/functional/
        merge-multiple: true

    - name: Generate coverage report
      run: bun run scripts/coverage-report.ts

    - name: Upload coverage report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: coverage-report
        path: coverage/report/

  build:
    needs: [coverage, playwright, unit-test-windows, functional-test-windows]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Install dependencies
      run: sudo apt install -y mupdf-tools openjdk-25-jdk-headless

    - name: Set up Java 25
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64" >> "$GITHUB_ENV"
        echo "/usr/lib/jvm/java-25-openjdk-amd64/bin" >> "$GITHUB_PATH"

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Download coverage report
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: coverage-report
        path: coverage/report/

    - name: Extract coverage percentage
      id: coverage
      run: |
        total=0; hit=0
        while IFS= read -r line; do
          case "$line" in
            LF:*) total=$((total + ${line#LF:})) ;;
            LH:*) hit=$((hit + ${line#LH:})) ;;
          esac
        done < coverage/report/lcov.info
        echo "percent=$((hit * 100 / total))" >> "$GITHUB_OUTPUT"

    - name: Initialize example site
      run: >
        bun run bin/tada.ts init example --no-interactive
        --prod-base https://abreen.io
        --prod-base-path /Tada

    - name: Add coverage vars to site config
      run: |
        jq --arg pct "${{ steps.coverage.outputs.percent }}" \
           '.vars.testCoveragePercent = ($pct | tonumber) | .vars.testCoverageUrl = "/coverage/index.html"' \
           example/site.prod.json > tmp.json && mv tmp.json example/site.prod.json

    - name: Copy coverage report into public
      run: cp -r coverage/report/ example/public/coverage/

    - name: Build example site
      run: ../bin/tada.ts prod
      working-directory: example

    - name: Upload static files as artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
      with:
        path: example/dist-prod/v1/

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  purge:
    if: github.event_name == 'push'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}'
