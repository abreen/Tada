name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version-commit:
    runs-on: ubuntu-latest

    outputs:
      run-ci: ${{ steps.check.outputs.run-ci }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Check version commit
      id: check
      run: |
        version="$(jq -r .version package.json)"
        subject="$(git log -1 --pretty=%s)"
        tag="$(git tag --points-at HEAD --list "v$version")"

        if [ "$subject" = "$version" ] && [ "$tag" = "v$version" ]; then
          echo "run-ci=false" >> "$GITHUB_OUTPUT"
        else
          echo "run-ci=true" >> "$GITHUB_OUTPUT"
        fi

  unit-test:
    needs: check-version-commit
    if: needs.check-version-commit.outputs.run-ci == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Run unit tests
      run: bun test

  functional-test:
    needs: check-version-commit
    if: needs.check-version-commit.outputs.run-ci == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install dependencies
      run: sudo apt install -y mupdf-tools openjdk-25-jdk-headless

    - name: Set up Java 25
      run: |
        echo "JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64" >> "$GITHUB_ENV"
        echo "/usr/lib/jvm/java-25-openjdk-amd64/bin" >> "$GITHUB_PATH"

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.13"

    - name: Set up Python tooling
      run: bun run setup:python

    - name: Run functional tests (shard ${{ matrix.shard }}/5)
      run: >
        bun run test:functional
        --shard ${{ matrix.shard }} --num-shards 5

  unit-test-windows:
    needs: check-version-commit
    if: needs.check-version-commit.outputs.run-ci == 'true'
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Run unit tests
      run: bun test

  functional-test-windows:
    needs: check-version-commit
    if: needs.check-version-commit.outputs.run-ci == 'true'
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install mupdf (provides mutool)
      run: choco install mupdf -y --no-progress

    - name: Set up Java 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: temurin
        java-version: '25'

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.13"

    - name: Set up Python tooling
      run: bun run setup:python

    - name: Run functional tests (shard ${{ matrix.shard }}/5)
      run: >
        bun run test:functional
        --shard ${{ matrix.shard }} --num-shards 5

  playwright:
    needs: check-version-commit
    if: needs.check-version-commit.outputs.run-ci == 'true'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Use Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

    - run: bun install

    - name: Install Playwright browsers
      run: bunx playwright install --with-deps chromium

    - name: Run Playwright tests
      run: bun run test:playwright
